<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1345" />
      <stop offset="100%" stop-color="#05050f" />
    </radialGradient>
    
    <!-- Neon Purple Gradient -->
    <linearGradient id="purple-neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a29bfe" />
      <stop offset="100%" stop-color="#6c5ce7" />
    </linearGradient>
    
    <!-- Neon Red/Pink Gradient -->
    <linearGradient id="red-neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fd79a8" />
      <stop offset="100%" stop-color="#e84393" />
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffeaa7" />
      <stop offset="100%" stop-color="#fdcb6e" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" />
  
  <!-- Outer Neon Rings -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#purple-neon)" stroke-width="6" opacity="0.2" />
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#red-neon)" stroke-width="4" stroke-dasharray="60 180" filter="url(#neon-glow)" />
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#purple-neon)" stroke-width="4" stroke-dasharray="80 140" stroke-dashoffset="120" filter="url(#neon-glow)" />

  <!-- Center Group -->
  <g filter="url(#card-shadow)">
    <!-- Mystery Hat/Fedora -->
    <path d="M128,180 C128,180 200,100 256,100 C312,100 384,180 384,180 L408,180 C424,180 430,196 414,204 C384,218 320,224 256,224 C192,224 128,218 98,204 C82,196 88,180 104,180 Z" fill="url(#purple-neon)" />
    <!-- Hat Ribbon -->
    <path d="M142,175 C180,165 220,160 256,160 C292,160 332,165 370,175 L373,180 C335,172 295,168 256,168 C217,168 177,172 139,180 Z" fill="url(#red-neon)" filter="url(#neon-glow)" />

    <!-- Sunglasses / Spy Glasses -->
    <!-- Left lens -->
    <path d="M150,230 L230,230 C240,250 235,280 200,280 C165,280 150,260 150,230 Z" fill="#050512" stroke="url(#purple-neon)" stroke-width="4" />
    <path d="M160,240 L195,240 C200,250 200,265 180,265 C165,265 160,255 160,240 Z" fill="rgba(255,255,255,0.05)" />
    <!-- Reflection Left -->
    <path d="M165,245 L180,245 L170,260 L165,260 Z" fill="white" opacity="0.4" />

    <!-- Right lens -->
    <path d="M282,230 L362,230 C362,260 347,280 312,280 C277,280 272,250 282,230 Z" fill="#050512" stroke="url(#red-neon)" stroke-width="4" />
    <path d="M292,240 L327,240 C327,255 322,265 307,265 C292,265 292,250 292,240 Z" fill="rgba(255,255,255,0.05)" />
    <!-- Reflection Right -->
    <path d="M297,245 L312,245 L302,260 L297,260 Z" fill="white" opacity="0.4" />

    <!-- Bridge between lenses -->
    <rect x="230" y="238" width="52" height="6" rx="3" fill="url(#gold)" />

    <!-- Mysterious Half Mask -->
    <!-- Background of mask plate -->
    <path d="M140,296 C140,296 160,400 256,420 C352,400 372,296 372,296 C372,296 280,310 256,310 C232,310 140,296 140,296 Z" fill="#0a0a20" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
    
    <!-- Left side (Innocent) mask styling: purple curves -->
    <path d="M140,296 C140,296 160,400 256,420 L256,310 C232,310 140,296 140,296 Z" fill="url(#purple-neon)" opacity="0.12" />
    <path d="M168,328 C188,338 208,343 228,343" fill="none" stroke="url(#purple-neon)" stroke-width="3" stroke-linecap="round" opacity="0.5" />
    <path d="M183,358 C198,368 213,373 233,373" fill="none" stroke="url(#purple-neon)" stroke-width="3" stroke-linecap="round" opacity="0.5" />

    <!-- Right side (Imposter) mask styling: red neon glow & glitch smirk -->
    <path d="M256,310 C280,310 372,296 372,296 C372,296 352,400 256,420 L256,310 Z" fill="url(#red-neon)" opacity="0.22" />
    <!-- Glitch smirk -->
    <path d="M256,360 Q290,350 330,370 Q300,395 256,400 Z" fill="url(#red-neon)" filter="url(#neon-glow)" />
    <!-- Sharp Teeth / Grin detail -->
    <path d="M272,365 L277,373 L282,365 L287,373 L292,365 L297,373 L302,365 L307,373 L312,365" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />

    <!-- Diagonal boundary separating innocent & imposter -->
    <line x1="256" y1="210" x2="256" y2="425" stroke="url(#gold)" stroke-width="3" stroke-dasharray="5 5" filter="url(#neon-glow)" />
  </g>

  <!-- Title/Branding below character -->
  <text x="256" y="475" font-family="'Orbitron', sans-serif" font-weight="900" font-size="28" fill="url(#gold)" text-anchor="middle" letter-spacing="8" filter="url(#neon-glow)">
    IMPOSTER
  </text>
</svg>
